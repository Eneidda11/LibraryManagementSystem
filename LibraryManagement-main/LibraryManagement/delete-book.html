<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Book - Library Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <a class='navbar-brand mb-0 h1' href='index.html'>Library Management System</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-danger">
                    <div class="card-body p-5">
                        <h2 class="card-title text-danger mb-3">Delete Book</h2>
                        <p class="mb-4">Are you sure you want to delete this book from the inventory?</p>

                        <div class="alert alert-light" id="bookInfo">
                            <p><strong>Title:</strong> <span id="infoTitle"></span></p>
                            <p><strong>Book ID:</strong> <span id="infoId"></span></p>
                        </div>

                        <p class="text-muted small mb-4">This action cannot be undone.</p>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a class='btn btn-secondary' href='index.html'>Cancel</a>
                            <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Yes, Delete Book</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="scripts/delete-book.js"></script>
</body>
</html>
