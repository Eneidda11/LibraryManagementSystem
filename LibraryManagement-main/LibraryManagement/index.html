<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                📖 My Library App
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0">Book Inventory</h2>
                <p class="text-muted">Manage your collection efficiently</p>
            </div>
            <div>
                <a class="btn btn-primary px-4 shadow-sm" href="add-book.html">+ Add Book</a>
                <button class="btn btn-outline-danger ms-2 shadow-sm" id="clearAllBtn">Clear All</button>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="booksTable">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4">Title (ID)</th>
                            <th>Author</th>
                            <th>Genre</th>
                            <th>Year</th>
                            <th>Status</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="6" class="text-center text-muted py-5">
                                <div class="fs-1 mb-2">💨</div>
                                <h5 class="fw-bold">Your library is currently a desert.</h5>
                                <p>Even the tumbleweeds are bored. Add a book before we turn into a parking lot! 🌵</p>

                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="scripts/index.js"></script>
</body>

</html>
